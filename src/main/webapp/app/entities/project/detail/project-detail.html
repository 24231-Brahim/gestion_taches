<div class="d-flex justify-content-center">
  <div class="col-12 col-lg-8">
    @if (project(); as projectRef) {
      <div>
        <h2 class="page-heading" data-cy="projectDetailsHeading">
          <span jhiTranslate="gestionTachesApp.project.detail.title">Project</span>
        </h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ projectRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="gestionTachesApp.project.name">Name</span></dt>
          <dd>
            <span>{{ projectRef.name }}</span>
          </dd>
          <dt><span jhiTranslate="gestionTachesApp.project.description">Description</span></dt>
          <dd>
            <span>{{ projectRef.description }}</span>
          </dd>
          <dt><span jhiTranslate="gestionTachesApp.project.key">Key</span></dt>
          <dd>
            <span class="badge border-primary">{{ projectRef.key }}</span>
          </dd>
          <dt><span jhiTranslate="gestionTachesApp.project.createdAt">Created At</span></dt>
          <dd>
            <span>{{ projectRef.createdAt | formatMediumDatetime }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Retour</span>
        </button>

        <button type="button" [routerLink]="['/project', projectRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Editer</span>
        </button>
      </div>
    }
  </div>
</div>
