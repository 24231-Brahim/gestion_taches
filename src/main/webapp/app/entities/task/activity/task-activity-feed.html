<div class="task-activity">
  <h5 class="task-section-title" jhiTranslate="gestionTachesApp.task.history"></h5>
  <div class="activity-feed">
    @for (h of histories(); track h.id) {
      <div class="activity-item">
        <div class="activity-dot"></div>
        <div class="activity-content">
          <span class="activity-action">{{ h.action }}</span>
          @if (h.user?.login) {
            <span class="activity-detail"> — {{ 'gestionTachesApp.activity.by' | translate }} {{ h.user?.login }}</span>
          }
          @if (h.fieldChanged) {
            <span class="activity-detail"> — {{ h.fieldChanged }}: {{ h.oldValue }} → {{ h.newValue }}</span>
          }
          <div class="activity-date">{{ h.createdAt | formatMediumDatetime }}</div>
        </div>
      </div>
    } @empty {
      <div class="text-muted" jhiTranslate="gestionTachesApp.actionHistory.home.notFound"></div>
    }
  </div>
</div>
