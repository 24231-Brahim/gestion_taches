<div class="task-comments">
  <h5 class="task-section-title" jhiTranslate="gestionTachesApp.task.comments"></h5>
  @for (comment of comments(); track comment.id) {
    <div class="comment-item">
      <div class="comment-header">
        <span class="comment-author">{{ comment.author?.login ?? ('error.messages.unassigned' | translate) }}</span>
        <span class="comment-date">{{ comment.createdAt | formatMediumDatetime }}</span>
        @if (canModify(comment)) {
          <button class="btn btn-sm btn-danger comment-delete" (click)="deleteComment(comment.id)">
            <fa-icon icon="xmark" />
          </button>
        }
      </div>
      <div class="comment-content">{{ comment.content }}</div>
    </div>
  } @empty {
    <div class="text-muted" jhiTranslate="gestionTachesApp.comment.home.notFound"></div>
  }
  <div class="comment-form">
    <textarea
      class="form-control"
      [ngModel]="newCommentText()"
      (ngModelChange)="newCommentText.set($event)"
      rows="2"
      placeholder="{{ 'gestionTachesApp.comment.form.placeholder' | translate }}"
    ></textarea>
    <button class="btn btn-primary btn-sm mt-2" (click)="addComment()" [disabled]="!newCommentText().trim()">
      <fa-icon icon="plus" /> {{ 'gestionTachesApp.comment.form.submit' | translate }}
    </button>
  </div>
</div>
