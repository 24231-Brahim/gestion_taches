<div class="burndown-container">
  <div class="burndown-stats">
    <div class="stat-card">
      <span class="stat-label">{{ 'gestionTachesApp.epic.burndown.total' | translate }}</span>
      <span class="stat-value">{{ totalTasks() }}</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">{{ 'gestionTachesApp.epic.burndown.done' | translate }}</span>
      <span class="stat-value done">{{ doneTasks() }}</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">{{ 'gestionTachesApp.epic.burndown.remaining' | translate }}</span>
      <span class="stat-value remaining">{{ totalTasks() - doneTasks() }}</span>
    </div>
  </div>

  <div class="burndown-chart">
    <svg viewBox="0 0 300 200" class="burndown-svg">
      @for (y of [40, 80, 120, 160]; track y) {
        <line x1="40" [attr.y1]="y" x2="290" [attr.y2]="y" stroke="var(--color-outline-variant, #2a3038)" stroke-width="1" />
      }
      <line x1="40" y1="40" x2="290" y2="160" stroke="var(--color-primary, #97cbff)" stroke-width="2" stroke-dasharray="4" />
      @if (actualPoints().length >= 2) {
        <polyline [attr.points]="actualLine()" fill="none" stroke="var(--color-status-done, #4caf50)" stroke-width="2" />
        @for (pt of actualPoints(); track $index) {
          <circle [attr.cx]="pt.x" [attr.cy]="pt.y" r="3" fill="var(--color-status-done, #4caf50)" />
        }
      }
      <text x="165" y="190" text-anchor="middle" fill="var(--color-text-muted, #6a8fac)" font-size="10">
        {{ 'gestionTachesApp.epic.burndown.time' | translate }}
      </text>
      <text x="10" y="100" text-anchor="middle" fill="var(--color-text-muted, #6a8fac)" font-size="10" transform="rotate(-90, 10, 100)">
        {{ 'gestionTachesApp.epic.burndown.tasks' | translate }}
      </text>
    </svg>
  </div>
</div>
