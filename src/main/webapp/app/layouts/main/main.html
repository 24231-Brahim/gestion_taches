<!-- <jhi-page-ribbon /> -->

<div class="app-shell">
  @if (account() !== null) {
    <router-outlet name="navbar" />
  }

  <div class="app-body" [class.app-body-no-nav]="account() === null">
    @if (account() !== null) {
      <jhi-sidebar />
    }

    <main class="app-content" [class.app-content-full]="account() === null">
      <jhi-breadcrumb />
      <router-outlet />
    </main>
  </div>

  @if (account() !== null) {
    <jhi-bottom-nav />
  }
</div>
