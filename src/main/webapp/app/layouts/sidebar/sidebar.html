<div class="sidebar-overlay" [class.show]="mobileOpen()" (click)="closeMobile()"></div>

<aside class="sidebar" [class.collapsed]="collapsed()" [class.mobile-open]="mobileOpen()">
  <button class="sidebar-toggle" (click)="toggleCollapse()">
    <fa-icon [icon]="collapsed() ? 'chevron-right' : 'chevron-left'" />
  </button>

  <nav class="sidebar-nav">
    <a class="sidebar-item" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMobile()">
      <fa-icon icon="home" [fixedWidth]="true" />
      <span class="sidebar-label" jhiTranslate="global.menu.home">Accueil</span>
    </a>

    @if (account() !== null) {
      <a
        class="sidebar-item"
        routerLink="/project"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeMobile()"
      >
        <fa-icon icon="folder" [fixedWidth]="true" />
        <span class="sidebar-label" jhiTranslate="global.menu.entities.project">Projects</span>
      </a>

      <a class="sidebar-item" routerLink="/sprint" routerLinkActive="active" (click)="closeMobile()">
        <fa-icon icon="tasks" [fixedWidth]="true" />
        <span class="sidebar-label" jhiTranslate="global.menu.entities.sprint">Sprints</span>
      </a>

      <a class="sidebar-item" routerLink="/epic" routerLinkActive="active" (click)="closeMobile()">
        <fa-icon icon="bookmark" [fixedWidth]="true" />
        <span class="sidebar-label" jhiTranslate="global.menu.entities.epic">Epics</span>
      </a>

      <a class="sidebar-item" routerLink="/issue" routerLinkActive="active" (click)="closeMobile()">
        <fa-icon icon="bug" [fixedWidth]="true" />
        <span class="sidebar-label" jhiTranslate="global.menu.entities.issue">Issues</span>
      </a>

      <a class="sidebar-item" routerLink="/comment" routerLinkActive="active" (click)="closeMobile()">
        <fa-icon icon="comment" [fixedWidth]="true" />
        <span class="sidebar-label" jhiTranslate="global.menu.entities.comment">Comments</span>
      </a>

      <a class="sidebar-item" routerLink="/attachment" routerLinkActive="active" (click)="closeMobile()">
        <fa-icon icon="paperclip" [fixedWidth]="true" />
        <span class="sidebar-label" jhiTranslate="global.menu.entities.attachment">Attachments</span>
      </a>

      <a class="sidebar-item" routerLink="/action-history" routerLinkActive="active" (click)="closeMobile()">
        <fa-icon icon="history" [fixedWidth]="true" />
        <span class="sidebar-label" jhiTranslate="global.menu.entities.actionHistory">History</span>
      </a>
    }

    <hr class="sidebar-divider" />

    @if (account() !== null) {
      <a class="sidebar-item" routerLink="/account/settings" routerLinkActive="active" (click)="closeMobile()">
        <fa-icon icon="cog" [fixedWidth]="true" />
        <span class="sidebar-label" jhiTranslate="global.menu.account.settings">Settings</span>
      </a>
    }
  </nav>
</aside>
